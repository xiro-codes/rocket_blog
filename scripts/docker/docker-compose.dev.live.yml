# Docker Compose for Live Development with dual-binary architecture
# This version is container-only with no host PC interactions

services:
  # The database service
  postgres:
    image: postgres:13 # Using a specific version is recommended
    restart: always
    environment:
      # Sets the default user, password, and database as specified
      POSTGRES_USER: master
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tdavis_dev
    volumes:
      # Persists the database data to a named volume
      - postgres_data:/var/lib/postgresql/data
    networks:
      app-network:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U master -d tdavis_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The blog application service (live development)
  blog:
    build: 
      context: ../..
      dockerfile: scripts/docker/Dockerfile.dev
    restart: always
    command: ["./blog"]
    ports:
      - "8000:8000"
    environment:
      # Override database URL to use docker service name
      ROCKET_DATABASES__SEA_ORM__URL: "postgres://master:password@postgres/tdavis_dev"
      ROCKET_PORT: 8000
      # Development environment settings
      RUST_LOG: debug
      ROCKET_ENV: development
    volumes:
      # Persist uploaded files
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      app-network:
        ipv4_address: 172.20.0.30

  # The work time tracker PWA service (live development)
  worktime:
    build: 
      context: ../..
      dockerfile: scripts/docker/Dockerfile.dev
    restart: always
    command: ["./worktime"]
    ports:
      - "8001:8001"
    environment:
      # Override database URL to use docker service name
      ROCKET_DATABASES__SEA_ORM__URL: "postgres://master:password@postgres/tdavis_dev"
      ROCKET_PORT: 8001
      # Development environment settings
      RUST_LOG: debug
      ROCKET_ENV: development
    volumes:
      # Persist uploaded files
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      app-network:
        ipv4_address: 172.20.0.31
  
  # The pgAdmin GUI service (internal access only)
  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      # Sets the login credentials for the pgAdmin web interface
      PGADMIN_DEFAULT_EMAIL: master@example.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    depends_on:
      # Ensures the postgres service starts before pgAdmin
      - postgres
    networks:
      app-network:
        ipv4_address: 172.20.0.20

# Define networks for stable inter-container communication
networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Define the named volumes for data persistence
volumes:
  postgres_data:
  app_data: