[package]
name = "rocket-template"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
lipsum = "0.9.1"
log = "0.4.27"
markdown = "1.0.0"
migrations = {path = "./migrations" }
mime_guess = "2.0.5"
models = { path = "./models" }
pwhash = "1.0.0"
rand = "0.8.1"
rand_mt = "5.0.0"
sea-orm-rocket = "0.5.5"
slug = "0.1.6"

[dependencies.rocket]
version = "0.5"
features = [ "http2", "json", "uuid", "secrets"]

[dependencies.rocket_dyn_templates]
version = "0.1"
features = ["tera"]

[dependencies.sea-orm]
version = "1.1.1"
features = [ "sqlx-postgres", "runtime-tokio-rustls", "macros"]

[dependencies.chrono]
version = "0.4.31"
features = ["serde"]

[dependencies.uuid]
version = "1.4.1"
features = ["v4", "serde"]

[workspace]
members = ["migrations", "models"]
