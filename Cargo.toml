[package]
name = "rocket-template"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
migrations = {path = "./migrations" }
models = { path = "./models" }
pwhash = "1"
lipsum = "0.9"
rand_mt = {version = "*", features = ["rand-traits"]}
rand = "0.8"
markdown = "1.0.0-alpha.14"

[dependencies.rocket]
version = "=0.5.0-rc.3"
features = [ "http2", "json", "uuid", "secrets"]

[dependencies.rocket_dyn_templates]
version = "=0.1.0-rc.3"
features = ["tera"]

[dependencies.sea-orm-rocket]
version = "0.5.2"

[dependencies.sea-orm]
version = "0.12"
features = [ "sqlx-postgres", "runtime-tokio-rustls", "macros"]

[dependencies.chrono]
version = "0.4.31"
features = ["serde"]

[dependencies.uuid]
version = "1.4.1"
features = ["v4", "serde"]

[workspace]
members = ["migrations", "models"]
