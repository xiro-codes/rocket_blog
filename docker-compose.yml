services:
  # The database service
  postgres:
    image: postgres:13 # Using a specific version is recommended
    restart: always
    environment:
      # Sets the default user, password, and database as specified
      POSTGRES_USER: master
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tdavis_dev
    volumes:
      # Persists the database data to a named volume on the host
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U master -d tdavis_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Only expose port for external access if needed
    ports:
      - "5432:5432"

  # The Rust web application
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    restart: always
    # No direct port exposure - nginx will proxy to this
    environment:
      # Override database URL to use docker service name
      ROCKET_DATABASES__SEA_ORM__URL: "postgres://master:password@postgres/tdavis_dev"
    volumes:
      # Persist uploaded files
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # Nginx reverse proxy with SSL termination
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates and webroot for certbot
      - letsencrypt_data:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - app-network

  # Certbot for SSL certificate management
  certbot:
    image: certbot/certbot
    restart: "no"
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    command: >
      sh -c "
        while :; do
          certbot renew --webroot --webroot-path=/var/www/certbot --quiet
          sleep 12h
        done
      "
    depends_on:
      - nginx
  # The pgAdmin GUI service
  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      # Sets the login credentials for the pgAdmin web interface
      PGADMIN_DEFAULT_EMAIL: master@example.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      # Maps the container's web server port to a host port (5050)
      - "5050:80"
    depends_on:
      # Ensures the postgres service starts before pgAdmin
      - postgres
    networks:
      - app-network

# Define networks for stable inter-container communication
networks:
  app-network:
    driver: bridge

# Define the named volumes for data persistence
volumes:
  postgres_data:
  app_data:
  letsencrypt_data:
  certbot_webroot:
  nginx_logs:

